<!DOCTYPE html>

<head>
  
    <title>list in html</title>
</head>
<body>
    <!-- ordered list -->
     <ol type="i">
        <li>maths</li>
        <li>science</li>
        <li>english</li>
        <li>social studies</li>
        <li>hindi</li>
     </ol>
    <!-- unordered list -->
     <ul>
        <li>mango</li>
        <li>kiwi</li>
        <li>orange</li>
        <li>apple</li>
        <li>cherry</li>
     </ul>
</body>
</html>
