<!DOCTYPE html>

<head>
    <style>
        div {
            width: 100px;
            height: 200px;
            animation-name: colourchange;
            animation-duration: 10s;
        }
        @keyframes colourchange {
            from {background-color: blue;}
            to {background-color: bisque;}
        }
    </style>
    
    <title>animation in css</title>
</head>
<body>
    <div> this is an animation</div>
</body>
</html>
